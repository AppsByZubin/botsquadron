name: Build Push And Update Botyard

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional image tag override"
        required: false
        type: string

env:
  DOCKERHUB_REPOSITORY: bizzkpm/botsquadimage
  PLATFORMS: linux/amd64

jobs:
  docker:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: marketfeeder
            context: services/marketfeeder
            dockerfile: services/marketfeeder/Dockerfile
          - service: ordersystem
            context: services/ordersystem
            dockerfile: services/ordersystem/Dockerfile
          - service: solobot
            context: .
            dockerfile: bots/solobot/Dockerfile

    steps:
      - name: Checkout botsquadron
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          RAW_TAG="${{ github.event.inputs.image_tag || '' }}"

          if [[ -z "${RAW_TAG}" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RAW_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${RAW_TAG}" ]]; then
            RAW_TAG="${GITHUB_SHA::7}"
          fi

          SAFE_TAG="$(printf '%s' "${RAW_TAG}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-80)"

          if [[ -z "${SAFE_TAG}" ]]; then
            SAFE_TAG="${GITHUB_SHA::7}"
          fi

          echo "value=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ env.DOCKERHUB_REPOSITORY }}:${{ matrix.service }}-${{ steps.tag.outputs.value }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  update-botyard:
    name: Update botyard values
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          RAW_TAG="${{ github.event.inputs.image_tag || '' }}"

          if [[ -z "${RAW_TAG}" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RAW_TAG="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${RAW_TAG}" ]]; then
            RAW_TAG="${GITHUB_SHA::7}"
          fi

          SAFE_TAG="$(printf '%s' "${RAW_TAG}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-80)"

          if [[ -z "${SAFE_TAG}" ]]; then
            SAFE_TAG="${GITHUB_SHA::7}"
          fi

          echo "value=${SAFE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Checkout botyard repo
        uses: actions/checkout@v4
        with:
          repository: AppsByZubin/botyard
          token: ${{ secrets.BOTYARD_REPO_TOKEN }}
          path: botyard

      - name: Install ruamel.yaml
        run: python3 -m pip install ruamel.yaml

      - name: Update Helm values.yaml
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          python3 <<'PY'
          import os
          from pathlib import Path
          from ruamel.yaml import YAML

          path = Path("botyard/helm/botsquadron/values.yaml")
          yaml = YAML()
          yaml.preserve_quotes = True

          with path.open("r") as f:
              data = yaml.load(f)

          repo = "docker.io/bizzkpm/botsquadimage"
          tag = os.environ["IMAGE_TAG"]

          data["ordersystem"]["image"]["repository"] = repo
          data["ordersystem"]["image"]["tag"] = f"ordersystem-{tag}"

          data["marketfeeder"]["image"]["repository"] = repo
          data["marketfeeder"]["image"]["tag"] = f"marketfeeder-{tag}"

          data["solobot"]["image"]["repository"] = repo
          data["solobot"]["image"]["tag"] = f"solobot-{tag}"

          with path.open("w") as f:
              yaml.dump(data, f)
          PY

      - name: Verify no placeholder remains
        run: |
          if grep -R '\${IMAGE_TAG}' botyard/helm/botsquadron/values.yaml; then
            echo "Placeholder IMAGE_TAG still present"
            exit 1
          fi
          cat botyard/helm/botsquadron/values.yaml

      - name: Commit and push botyard repo
        run: |
          cd botyard
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/botsquadron/values.yaml
          git commit -m "Deploy botsquadron ${GITHUB_SHA::7}" || echo "No changes to commit"
          git push origin HEAD
