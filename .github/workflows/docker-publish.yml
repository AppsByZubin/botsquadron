name: Build Push And Update Infra

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional tag suffix, e.g. v1.0.0"
        required: false
        type: string

env:
  DOCKERHUB_REPOSITORY: bizzkpm/botsquadimage
  PLATFORMS: linux/amd64

jobs:
  docker:
    name: Push ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: marketfeeder
            context: services/marketfeeder
            dockerfile: services/marketfeeder/Dockerfile
          - service: ordersystem
            context: services/ordersystem
            dockerfile: services/ordersystem/Dockerfile
          - service: solobot
            context: .
            dockerfile: bots/solobot/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          raw_tag="${{ github.event.inputs.image_tag || '' }}"

          if [[ -z "${raw_tag}" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            raw_tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${raw_tag}" ]]; then
            raw_tag="${GITHUB_SHA::7}"
          fi

          safe_tag="$(printf '%s' "${raw_tag}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-80)"

          if [[ -z "${safe_tag}" ]]; then
            safe_tag="${GITHUB_SHA::7}"
          fi

          echo "value=${safe_tag}" >> "${GITHUB_OUTPUT}"
          echo "image=${DOCKERHUB_REPOSITORY}:${{ matrix.service }}-${safe_tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.tag.outputs.image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  update-infra:
    name: Update infrastructure values.yaml
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          raw_tag="${{ github.event.inputs.image_tag || '' }}"

          if [[ -z "${raw_tag}" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            raw_tag="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${raw_tag}" ]]; then
            raw_tag="${GITHUB_SHA::7}"
          fi

          safe_tag="$(printf '%s' "${raw_tag}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-80)"

          if [[ -z "${safe_tag}" ]]; then
            safe_tag="${GITHUB_SHA::7}"
          fi

          echo "value=${safe_tag}" >> "${GITHUB_OUTPUT}"

      - name: Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: AppsByZubin/infrastructure
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infrastructure

      - name: Install ruamel.yaml
        run: python3 -m pip install ruamel.yaml

      - name: Update Helm values
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
        run: |
          python3 <<'PY'
          import os
          from pathlib import Path
          from ruamel.yaml import YAML

          path = Path("infrastructure/helm/botsquadron/values.yaml")
          yaml = YAML()
          yaml.preserve_quotes = True

          with path.open("r") as f:
              data = yaml.load(f)

          repo = "docker.io/bizzkpm/botsquadimage"
          tag = os.environ["IMAGE_TAG"]

          data["ordersystem"]["image"]["repository"] = repo
          data["ordersystem"]["image"]["tag"] = f"ordersystem-{tag}"

          data["marketfeeder"]["image"]["repository"] = repo
          data["marketfeeder"]["image"]["tag"] = f"marketfeeder-{tag}"

          data["solobot"]["image"]["repository"] = repo
          data["solobot"]["image"]["tag"] = f"solobot-{tag}"

          with path.open("w") as f:
              yaml.dump(data, f)
          PY

      - name: Show updated values
        run: |
          echo "Updated infrastructure values:"
          cat infrastructure/helm/botsquadron/values.yaml

      - name: Commit and push infrastructure change
        run: |
          cd infrastructure
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/botsquadron/values.yaml
          git commit -m "Deploy botsquadron ${GITHUB_SHA::7}" || echo "No changes to commit"
          git push