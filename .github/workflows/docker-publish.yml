name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag suffix, for example v1.0.0 or 2026-04-15"
        required: false
        type: string

env:
  DOCKERHUB_REPOSITORY: bizzkpm/botsquadimage
  PLATFORMS: linux/amd64

jobs:
  docker:
    name: Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: marketfeeder
            context: services/marketfeeder
            dockerfile: services/marketfeeder/Dockerfile
          - service: ordersystem
            context: services/ordersystem
            dockerfile: services/ordersystem/Dockerfile
          - service: solobot
            context: .
            dockerfile: bots/solobot/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          raw_tag="${{ github.event.inputs.image_tag || '' }}"
          if [[ -z "${raw_tag}" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            raw_tag="${GITHUB_REF_NAME}"
          fi
          if [[ -z "${raw_tag}" ]]; then
            raw_tag="${GITHUB_SHA::7}"
          fi

          safe_tag="$(printf '%s' "${raw_tag}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-80)"

          if [[ -z "${safe_tag}" ]]; then
            safe_tag="${GITHUB_SHA::7}"
          fi

          echo "value=${safe_tag}" >> "${GITHUB_OUTPUT}"
          echo "image=${DOCKERHUB_REPOSITORY}:${{ matrix.service }}-${safe_tag}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.tag.outputs.image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.service }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Summary
        shell: bash
        run: |
          echo "Pushed ${{ steps.tag.outputs.image }}" >> "${GITHUB_STEP_SUMMARY}"
